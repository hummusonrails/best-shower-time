<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#1E1E1C"/>
  <!-- Shower head -->
  <rect x="14" y="4" width="4" height="3" rx="1" fill="#FFEEC8"/>
  <rect x="15" y="7" width="2" height="5" fill="#FFEEC8"/>
  <rect x="9" y="11" width="14" height="4" rx="2" fill="#FFEEC8"/>
  <!-- Water droplets -->
  <line x1="11" y1="16" x2="11" y2="19" stroke="#FFEEC8" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="16" x2="14" y2="21" stroke="#FFEEC8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="20" stroke="#FFEEC8" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="18" y1="16" x2="18" y2="22" stroke="#FFEEC8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="21" y1="16" x2="21" y2="18" stroke="#FFEEC8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Small droplets at bottom -->
  <circle cx="12" cy="24" r="1" fill="#FFEEC8" opacity="0.4"/>
  <circle cx="16" cy="26" r="1.2" fill="#FFEEC8" opacity="0.5"/>
  <circle cx="20" cy="25" r="0.8" fill="#FFEEC8" opacity="0.3"/>
</svg>
